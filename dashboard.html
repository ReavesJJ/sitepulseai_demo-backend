  <!-- Link to Modular JS -->
 <script>
// ---------------------------
// SitePulseAI Frontend (AI-Agnostic Architecture)
// ---------------------------

const API_BASE = "https://sitepulseai-demo-backend.onrender.com";
const REFRESH_INTERVAL = 60000;

// ---------------------------
// DOM ELEMENTS
// ---------------------------
const addInput = document.getElementById("multi-url-input");
const addButton = document.getElementById("addButton");

const uptimeEl = document.getElementById("uptime");
const responseEl = document.getElementById("response-time");
const seoEl = document.getElementById("seo-score");
const sslEl = document.getElementById("ssl-status");
const trafficEl = document.getElementById("traffic");
const vulnEl = document.getElementById("vulnerabilities");

const aiSummaryEl = document.getElementById("ai-summary");

// ---------------------------
// STATE
// ---------------------------
let segments = {};

// ---------------------------
// HELPERS
// ---------------------------
function normalizeDomain(domain) {
  if (!domain) return null;
  return domain.replace(/^https?:\/\//, "").replace(/\/$/, "").trim();
}

// ---------------------------
// AI CONFIG (CLIENT CONTROLLED ONLY)
// ---------------------------
function getAIConfig() {
  try {
    return {
      key: localStorage.getItem("ai_api_key"),
      provider: localStorage.getItem("ai_provider") || "openai"
    };
  } catch {
    return { key: null, provider: "openai" };
  }
}

// ---------------------------
// LOAD SEGMENTS
// ---------------------------
async function loadDomains() {
  try {
    const res = await fetch(`${API_BASE}/segments`);
    const data = await res.json();
    segments = data.segments || {};
  } catch (err) {
    console.error("Segments load failed:", err);
    segments = {};
  }
}

// ---------------------------
// FETCH METRICS
// ---------------------------
async function fetchAllMetrics(domain) {
  try {
    const [
      uptime,
      latency,
      ssl,
      seo,
      vulnerabilitiesRaw,
      traffic
    ] = await Promise.all([
      fetch(`${API_BASE}/uptime/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/latency/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/ssl/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/seo/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/vulnerabilities/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/traffic/${domain}`).then(r => r.json())
    ]);

    const vulnerabilities = vulnerabilitiesRaw?.vulnerabilities;

    return { domain, uptime, latency, ssl, seo, vulnerabilities, traffic };
  } catch (err) {
    console.error(`Metrics fetch failed for ${domain}:`, err);
    return null;
  }
}

// ---------------------------
// AI ANALYSIS (OPTIONAL LAYER)
// ---------------------------
async function runAIAnalysis(resultsList) {
  const { key, provider } = getAIConfig();

  // 🚫 AI NOT CONFIGURED (by design)
  if (!key) {
    aiSummaryEl.innerHTML = "AI analysis not configured";
    return;
  }

  try {
    aiSummaryEl.innerHTML = "Analyzing system state...";

    const response = await fetch(`${API_BASE}/ai/analyze`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-ai-provider": provider,
        "x-ai-key": key
      },
      body: JSON.stringify({
        domains: resultsList
      })
    });

    if (!response.ok) {
      throw new Error("AI request failed");
    }

    const data = await response.json();

    aiSummaryEl.innerHTML = formatAIOutput(data.analysis);

  } catch (err) {
    console.error("AI analysis error:", err);
    aiSummaryEl.innerHTML = "AI analysis unavailable";
  }
}

// ---------------------------
// FORMAT AI OUTPUT
// ---------------------------
function formatAIOutput(text) {
  if (!text) return "No AI output";

  return text
    .replace(/Current Status:/g, "<b>Current Status</b><br>")
    .replace(/Key Observations:/g, "<br><b>Key Observations</b><br>")
    .replace(/Why It Matters:/g, "<br><b>Why It Matters</b><br>")
    .replace(/Suggested Considerations:/g, "<br><b>Suggested Considerations</b><br>")
    .replace(/Confidence Note:/g, "<br><b>Confidence</b><br>")
    .replace(/\n/g, "<br>");
}

// ---------------------------
// RENDER GRID
// ---------------------------
function renderGrid(resultsList) {
  if (!resultsList || resultsList.length === 0) return;

  let uptimeHTML = "";
  let latencyHTML = "";
  let sslHTML = "";
  let seoHTML = "";
  let vulnHTML = "";
  let trafficHTML = "";

  resultsList.forEach(r => {
    if (!r) return;

    const domain = r.domain;

    uptimeHTML += `${domain} → ${r.uptime?.status || "Unknown"}<br>`;
    latencyHTML += `${domain} → ${r.latency?.response_time_ms ?? "--"} ms<br>`;

    const isValid = r.ssl?.valid;
    const days = r.ssl?.expires_in_days;

    sslHTML += `${domain} → ${isValid ? "Valid" : "Invalid"} (${days ?? "--"} days)<br>`;
    seoHTML += `${domain} → ${r.seo?.score ?? "--"}<br>`;

    const vulnCount = r.vulnerabilities?.total ?? 0;
    vulnHTML += `${domain} → ${vulnCount} issues<br>`;

    const visitors = r.traffic?.visitors_30d;
    trafficHTML += `${domain} → ${visitors ?? "No Data"}<br>`;
  });

  uptimeEl.innerHTML = uptimeHTML;
  responseEl.innerHTML = latencyHTML;
  sslEl.innerHTML = sslHTML;
  seoEl.innerHTML = seoHTML;
  vulnEl.innerHTML = vulnHTML;
  trafficEl.innerHTML = trafficHTML;

  // 🔥 AI layer executes AFTER rendering (non-blocking)
  runAIAnalysis(resultsList);
}

// ---------------------------
// MONITOR LOOP
// ---------------------------
async function monitoringLoop() {
  if (!segments || Object.keys(segments).length === 0) return;

  const allResults = [];

  for (const segment in segments) {
    const domains = segments[segment];
    const results = await Promise.all(domains.map(fetchAllMetrics));
    results.forEach(r => r && allResults.push(r));
  }

  renderGrid(allResults);
}

// ---------------------------
// ADD DOMAIN
// ---------------------------
async function addAdditionalURL() {
  const domain = normalizeDomain(addInput.value);
  if (!domain) return alert("Enter valid domain");

  try {
    await fetch(`${API_BASE}/add_url`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ domain, segment: "default" })
    });

    addInput.value = "";
    await loadDomains();
    monitoringLoop();

  } catch (err) {
    console.error("Add domain failed:", err);
  }
}

// ---------------------------
// INIT
// ---------------------------
async function init() {
  await loadDomains();
  monitoringLoop();
  setInterval(monitoringLoop, REFRESH_INTERVAL);

  if (addButton) {
    addButton.addEventListener("click", addAdditionalURL);
  }
}

init();
