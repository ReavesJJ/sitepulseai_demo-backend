<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SitePulseAI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1E293B] text-gray-100">

<div class="p-6 max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold text-[#0E4FAE] text-center mt-6 mb-4">
    SitePulseAI Infrastructure Visibility Console
  </h1>

  <div class="mt-6 p-4 bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
    <div class="flex flex-col sm:flex-row sm:items-center gap-2">
      <input id="website-url" type="text" placeholder="Enter website URL" class="flex-1 px-4 py-2 rounded border border-green-300 bg-[#E6FFFA] text-green-900 focus:ring-2 focus:ring-green-400 focus:outline-none" />
      <button onclick="startMonitoring()" class="bg-green-400 hover:bg-green-300 text-white font-semibold px-4 py-2 rounded shadow transition">Enable Monitoring</button>
    </div>
  </div>

  <div class="mt-6 mb-6 p-4 bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
    <div class="flex flex-col sm:flex-row sm:items-center gap-2">
      <input id="multi-url-input" type="text" placeholder="Enter additional URL" class="flex-1 px-4 py-2 rounded border border-purple-400 bg-[#F3E8FF] text-purple-800 focus:ring-2 focus:ring-purple-500 focus:outline-none" />

      <button 
  id="addButton"
  class="bg-purple-500 hover:bg-purple-400 text-white font-semibold px-4 py-2 rounded shadow transition">
  Add URL
</button>
    <ul id="multi-url-list" class="pl-6 mt-4 space-y-1 text-gray-700 text-sm"></ul>
  </div>
  

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-blue-400 shadow-blue-300 drop-shadow-lg">Uptime</h2>
      <p id="uptime" class="text-xl text-green-600 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-yellow-400 shadow-yellow-300 drop-shadow-lg">Response Time</h2>
      <p id="response-time" class="text-xl text-purple-600 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-pink-400 shadow-pink-300 drop-shadow-lg">SEO Status</h2>
      <p id="seo-score" class="text-xl text-blue-600 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-orange-400 shadow-orange-300 drop-shadow-lg">SSL Certificate</h2>
      <p id="ssl-status" class="text-xl text-red-600 mt-2"></p>

      <div id="ssl-managed"></div>
<div id="ssl-renewed"></div>

<button id="enable-assisted">Enable Assisted Renewal</button>
<button id="approve-renewal">Approve Renewal</button>

<button id="dry-run">Test Renewal (Dry Run)</button>
<div id="dry-run-result"></div>
   
    <!-- SitePulseAI renewal attribution -->
  <div id="ssl-renewal-flag" class="ssl-renewal-flag"></div>

  <button id="auto-fix-ssl-btn" onclick="triggerSSLAutoFix()" class="mt-2 bg-blue-500 hover:bg-blue-400 text-white px-3 py-1 rounded">
  Assisted SSL Workflow
</button>
<div id="ssl-auto-fix-output" class="text-sm mt-2 text-yellow-400"></div>


    </div>



    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-red-400">Site Traffic</h2>
      <p id="traffic" class="text-xl text-purple-500 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-red-400">Vulnerabilities Detected</h2>
      <p id="vulnerabilities" class="text-xl text-purple-500 mt-2"></p>
</p>
    </div>

  </div>

  <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB] mb-8">
    <h2 class="text-2xl font-bold text-green-400 shadow-green-300 drop-shadow-lg">AI Summary</h2>
    <p id="ai-summary" class="text-orange-700"></p>
  </div>

  <div class="bg-[#111827] p-6 rounded shadow border-2 border-[#2563EB] mt-6">
    <h2 class="text-2xl font-bold mb-8 text-purple-600">AI Recommendations</h2>
    <div id="ai-recommendations" class="text-red-700 leading-relaxed space-y-2"></div>
  </div>

  <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB] mt-4 relative">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold text-orange-400 shadow-blue-300 drop-shadow-lg">Saved Sites</h2>
      <button onclick="clearSavedSites()" class="bg-red-600 hover:bg-red-700 text-white text-sm px-3 py-1 rounded" title="Clear all saved sites">Delete</button>
    </div>
    <ul id="saved-sites" class="list-none pl-0 mt-2 space-y-1 text-white-800 text-sm"></ul>
  </div>


  <div id="domains-table"></div>


</div>


  <script>
// ---------------------------
// SitePulseAI Frontend Logic (Modular JS)
// ---------------------------



// dashboard.js
const API_BASE = "https://sitepulseai-demo-backend.onrender.com";

// ---------------------------
// DOM ELEMENTS
// ---------------------------
const websiteInput = document.getElementById("website-url");
const addInput = document.getElementById("multi-url-input");
const addButton = document.getElementById("addButton");

// CARD ELEMENTS
const uptimeEl = document.getElementById("uptime");
const responseEl = document.getElementById("response-time");
const seoEl = document.getElementById("seo-score");
const sslEl = document.getElementById("ssl-status");
const trafficEl = document.getElementById("traffic");
const vulnEl = document.getElementById("vulnerabilities");
const summaryEl = document.getElementById("ai-summary");
const recEl = document.getElementById("ai-recommendations");

// ---------------------------
// STATE
// ---------------------------
let segments = {};
const REFRESH_INTERVAL = 60000; // 60s

// ---------------------------
// HELPERS
// ---------------------------
function normalizeDomain(domain) {
  if (!domain) return null;
  return domain.replace(/^https?:\/\//, "").replace(/\/$/, "").trim();
}

// ---------------------------
// LOAD SEGMENTS FROM BACKEND
// ---------------------------
async function loadDomains() {
  try {
    const res = await fetch(`${API_BASE}/segments`);
    if (!res.ok) throw new Error("Segments endpoint failed");
    const data = await res.json();
    segments = data.segments || {};
    if (!segments || Object.keys(segments).length === 0) segments = {};
    console.log("Segments loaded:", segments);
  } catch (err) {
    console.error("Segments load failed:", err);
    segments = {};
  }
}

// ---------------------------
// FETCH ALL METRICS FOR DOMAIN
// ---------------------------
async function fetchAllMetrics(domain) {
  try {
    const [
      uptime,
      latency,
      ssl,
      seo,
      vulnerabilities,
      traffic
    ] = await Promise.all([
        

      fetch(`${API_BASE}/uptime/${domain}`).then(r => r.json()),


      fetch(`${API_BASE}/latency/${domain}`).then(r => r.json()),


      fetch(`${API_BASE}/ssl/${domain}`).then(r => r.json()),


      fetch(`${API_BASE}/seo/${domain}`).then(r => r.json()),


    ]);

    return { domain, uptime, latency, ssl, seo, vulnerabilities, traffic };
  } catch (err) {
    console.error(`Metrics fetch failed for ${domain}:`, err);
    return null;
  }
}


// ---------------------------
// RENDER CARDS
// ---------------------------
function renderGrid(resultsList) {
  if (!resultsList || resultsList.length === 0) return;

  let uptimeHTML = "";
  let latencyHTML = "";
  let sslHTML = "";
  let seoHTML = "";
  let vulnHTML = "";
  let trafficHTML = "";
  let summaryHTML = "";
  let recHTML = "";


  resultsList.forEach(r => {
    if (!r) return;
    const domain = r.domain;


    uptimeHTML += `${domain} → ${r.uptime?.status || "Unknown"}<br>`;

    latencyHTML += `${domain} → ${r.latency?.
        response_time_ms ?? "--"} ms<br>`;

    sslHTML += `${domain} → ${r.ssl?.valid ? "Valid" : "Invalid"}<br>`;

    seoHTML += `${domain} → ${r.seo?.score ?? "--"}<br>`;

    vulnHTML += `${domain} → ${r.vulnerabilities?.count ?? ""}<br>`;

    trafficHTML += `${domain} → ${r.traffic?.visits ?? ""}<br>`;

    summaryHTML += `${domain}: ${r.uptime?.status === "up" ? "Operational" : ""}, ${r.latency?.load_time ? Math.round(r.latency.load_time * 1000) : "--"} ms<br>`;


    if ((r.vulnerabilities?.count ?? 0) > 0) recHTML += `${domain}: Patch ${r.vulnerabilities.count} vulnerabilities<br>`;

    if (!r.ssl?.valid) recHTML += `${domain}: SSL misconfiguration detected<br>`;

    if (!r.seo?.score) recHTML += `${domain}: SEO improvements recommended<br>`;
  });

  uptimeEl.innerHTML = uptimeHTML || "--";
  responseEl.innerHTML = latencyHTML || "--";
  sslEl.innerHTML = sslHTML || "--";
  seoEl.innerHTML = seoHTML || "--";
  vulnEl.innerHTML = vulnHTML || "--";
  trafficEl.innerHTML = trafficHTML || "--";
  summaryEl.innerHTML = summaryHTML || "--";
  recEl.innerHTML = recHTML || "";
}

// ---------------------------
// MONITORING LOOP (FIXED)
// ---------------------------
async function monitoringLoop() {
  if (!segments || Object.keys(segments).length === 0) return;

  const allResults = [];

  for (const segment in segments) {
    const domains = segments[segment];
    const results = await Promise.all(domains.map(fetchAllMetrics));
    results.forEach(r => r && allResults.push(r));
  }

  renderGrid(allResults);
}

// ---------------------------
// ADD DOMAIN
// ---------------------------
async function addAdditionalURL() {
  const domain = normalizeDomain(addInput.value);
  if (!domain) {
    alert("Enter a valid domain");
    return;
  }

  try {
    const payload = { domain, segment: "default" };
    const res = await fetch(`${API_BASE}/add_url`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) alert(data.detail || "Failed to add domain");
    console.log("Domain added:", data);

    addInput.value = "";

    // Immediate fetch for newly added domain
    const immediate = await fetchAllMetrics(domain);
    if (immediate) renderGrid([immediate]);

    // Reload all segments
    await loadDomains();
  } catch (err) {
    console.error("Add domain failed:", err);
  }
}

// ---------------------------
// INIT
// ---------------------------
async function init() {
  await loadDomains();
  monitoringLoop();
  setInterval(monitoringLoop, REFRESH_INTERVAL);

  // Attach button
  if (addButton) addButton.addEventListener("click", addAdditionalURL);
}

init();


  </script>





  <!-- Link to Modular JS -->
 <script src="dashboard.js" defer></script>


 
</html>
  
</body>
