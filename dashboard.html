<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SitePulseAI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1E293B] text-gray-100">

<div class="p-6 max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold text-[#0E4FAE] text-center mt-6 mb-4">
    SitePulseAI Infrastructure Visibility Console
  </h1>

  <div class="mt-6 p-4 bg-[#111827] rounded shadow border-2 border-[#2563EB]">
    <div class="flex gap-2">
      <input id="multi-url-input" type="text" placeholder="Enter additional URL"
        class="flex-1 px-2 py-2 rounded border border-purple-400 bg-[#F3E8FF] text-purple-800"/>
      <button id="addButton"
        class="bg-purple-500 text-white px-4 py-2 rounded">
        Add URL
      </button>
    </div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
    <div class="bg-[#111827] p-4 rounded border"><h2>Uptime</h2><p id="uptime"></p></div>
    <div class="bg-[#111827] p-4 rounded border"><h2>Response</h2><p id="response-time"></p></div>
    <div class="bg-[#111827] p-4 rounded border"><h2>SEO</h2><p id="seo-score"></p></div>
    <div class="bg-[#111827] p-4 rounded border"><h2>SSL</h2><p id="ssl-status"></p></div>
    <div class="bg-[#111827] p-4 rounded border"><h2>Traffic</h2><p id="traffic"></p></div>
    <div class="bg-[#111827] p-4 rounded border"><h2>Vulnerabilities</h2><p id="vulnerabilities"></p></div>
  </div>

  <div class="bg-[#111827] p-4 mt-6 rounded border">
    <h2>AI Summary</h2>
    <p id="ai-summary"></p>
  </div>
</div>

<script>
const API_BASE = "https://sitepulseai-demo-backend.onrender.com";
const REFRESH_INTERVAL = 60000;

let segments = {};

// ---------------------------
// HELPERS
// ---------------------------
function normalizeDomain(domain) {
  if (!domain) return null;
  return domain.replace(/^https?:\/\//, "").replace(/\/$/, "").trim();
}

// ---------------------------
// TRAFFIC (RESTORED SAFE)
// ---------------------------
async function fetchTraffic(domain) {
  try {
    const res = await fetch(`${API_BASE}/traffic/${domain}`);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch {
    return { visitors_30d: 0, status: "Error" };
  }
}

// ---------------------------
// AI CONFIG (CLIENT CONTROLLED)
// ---------------------------
function getAIConfig() {
  return {
    key: localStorage.getItem("ai_api_key"),
    provider: localStorage.getItem("ai_provider") || "openai"
  };
}

// ---------------------------
// LOAD DOMAINS
// ---------------------------
async function loadDomains() {
  try {
    const res = await fetch(`${API_BASE}/segments`);
    const data = await res.json();
    segments = data.segments || {};
  } catch {
    segments = {};
  }
}

// ---------------------------
// FETCH METRICS
// ---------------------------
async function fetchAllMetrics(domain) {
  try {
    const [
      uptime,
      latency,
      ssl,
      seo,
      vulnerabilitiesRaw,
      traffic
    ] = await Promise.all([
      fetch(`${API_BASE}/uptime/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/latency/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/ssl/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/seo/${domain}`).then(r => r.json()),
      fetch(`${API_BASE}/vulnerabilities/${domain}`).then(r => r.json()),
      fetchTraffic(domain)
    ]);

    return {
      domain,
      uptime,
      latency,
      ssl,
      seo,
      vulnerabilities: vulnerabilitiesRaw?.vulnerabilities,
      traffic
    };

  } catch {
    return null;
  }
}

// ---------------------------
// AI ANALYSIS
// ---------------------------
async function runAIAnalysis(resultsList) {
  const { key, provider } = getAIConfig();

  if (!key) {
    document.getElementById("ai-summary").innerHTML = "AI not configured";
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/ai/analyze`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-ai-provider": provider,
        "x-ai-key": key
      },
      body: JSON.stringify({ domains: resultsList })
    });

    const data = await res.json();

    document.getElementById("ai-summary").innerHTML =
      (data.analysis || "").replace(/\n/g, "<br>");

  } catch {
    document.getElementById("ai-summary").innerHTML = "AI unavailable";
  }
}

// ---------------------------
// RENDER
// ---------------------------
function renderGrid(list) {
  if (!list.length) return;

  let uptime = "", latency = "", ssl = "", seo = "", vuln = "", traffic = "";

  list.forEach(r => {
    if (!r) return;

    uptime += `${r.domain} → ${r.uptime?.status}<br>`;
    latency += `${r.domain} → ${r.latency?.response_time_ms} ms<br>`;
    ssl += `${r.domain} → ${r.ssl?.valid ? "Valid" : "Invalid"}<br>`;
    seo += `${r.domain} → ${r.seo?.score}<br>`;
    vuln += `${r.domain} → ${r.vulnerabilities?.total || 0}<br>`;
    traffic += `${r.domain} → ${r.traffic?.visitors_30d || 0}<br>`;
  });

  document.getElementById("uptime").innerHTML = uptime;
  document.getElementById("response-time").innerHTML = latency;
  document.getElementById("ssl-status").innerHTML = ssl;
  document.getElementById("seo-score").innerHTML = seo;
  document.getElementById("vulnerabilities").innerHTML = vuln;
  document.getElementById("traffic").innerHTML = traffic;

  runAIAnalysis(list);
}

// ---------------------------
// LOOP
// ---------------------------
async function monitoringLoop() {
  const results = [];

  for (const segment in segments) {
    const domains = segments[segment];
    const r = await Promise.all(domains.map(fetchAllMetrics));
    r.forEach(x => x && results.push(x));
  }

  renderGrid(results);
}

// ---------------------------
// ADD DOMAIN
// ---------------------------
async function addAdditionalURL() {
  const input = document.getElementById("multi-url-input");
  const domain = normalizeDomain(input.value);

  if (!domain) return alert("Enter valid domain");

  await fetch(`${API_BASE}/add_url`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ domain, segment: "default" })
  });

  input.value = "";
  await loadDomains();
  monitoringLoop();
}

// ---------------------------
// INIT
// ---------------------------
async function init() {
  await loadDomains();
  monitoringLoop();
  setInterval(monitoringLoop, REFRESH_INTERVAL);

  document.getElementById("addButton")
    .addEventListener("click", addAdditionalURL);
}

init();
</script>

</body>
</html>
