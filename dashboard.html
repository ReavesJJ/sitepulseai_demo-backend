<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SitePulseAI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1E293B] text-gray-100">

<div class="p-6 max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold text-[#0E4FAE] text-center mt-6 mb-4">
    SitePulseAI Infrastructure Visibility Console
  </h1>

  <div class="mt-6 p-4 bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
    <div class="flex flex-col sm:flex-row sm:items-center gap-2">
      <input id="website-url" type="text" placeholder="Enter website URL" class="flex-1 px-4 py-2 rounded border border-green-300 bg-[#E6FFFA] text-green-900 focus:ring-2 focus:ring-green-400 focus:outline-none" />
      <button onclick="startMonitoring()" class="bg-green-400 hover:bg-green-300 text-white font-semibold px-4 py-2 rounded shadow transition">Enable Monitoring</button>
    </div>
  </div>

  <div class="mt-6 mb-6 p-4 bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
    <div class="flex flex-col sm:flex-row sm:items-center gap-2">
      <input id="multi-url-input" type="text" placeholder="Enter additional URL" class="flex-1 px-4 py-2 rounded border border-purple-400 bg-[#F3E8FF] text-purple-800 focus:ring-2 focus:ring-purple-500 focus:outline-none" />
      <button onclick="addAdditionalURL()" class="bg-purple-500 hover:bg-purple-400 text-white font-semibold px-4 py-2 rounded shadow transition">Add URL</button>
    </div>
    <ul id="multi-url-list" class="pl-6 mt-4 space-y-1 text-gray-700 text-sm"></ul>
  </div>
  

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-blue-400 shadow-blue-300 drop-shadow-lg">Uptime</h2>
      <p id="uptime" class="text-xl text-green-600 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-yellow-400 shadow-yellow-300 drop-shadow-lg">Response Time</h2>
      <p id="response" class="text-xl text-purple-600 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-pink-400 shadow-pink-300 drop-shadow-lg">SEO Status</h2>
      <p id="seo" class="text-xl text-blue-600 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-orange-400 shadow-orange-300 drop-shadow-lg">SSL Certificate</h2>
      <p id="ssl" class="text-xl text-red-600 mt-2"></p>

      <div id="ssl-managed"></div>
<div id="ssl-renewed"></div>

<button id="enable-assisted">Enable Assisted Renewal</button>
<button id="approve-renewal">Approve Renewal</button>

<button id="dry-run">Test Renewal (Dry Run)</button>
<div id="dry-run-result"></div>
   
    <!-- SitePulseAI renewal attribution -->
  <div id="ssl-renewal-flag" class="ssl-renewal-flag"></div>

  <button id="auto-fix-ssl-btn" onclick="triggerSSLAutoFix()" class="mt-2 bg-blue-500 hover:bg-blue-400 text-white px-3 py-1 rounded">
  Assisted SSL Workflow
</button>
<div id="ssl-auto-fix-output" class="text-sm mt-2 text-yellow-400"></div>


    </div>



    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-red-400">Site Traffic</h2>
      <p id="site-traffic" class="text-xl text-purple-500 mt-2"></p>
    </div>

    <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB]">
      <h2 class="font-bold text-red-400">Vulnerabilities Detected</h2>
      <p id="vulnerabilities" class="text-xl text-purple-500 mt-2"></p>
</p>
    </div>

  </div>

  <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB] mb-8">
    <h2 class="text-2xl font-bold text-green-400 shadow-green-300 drop-shadow-lg">AI Summary</h2>
    <p id="ai-summary" class="text-orange-700"></p>
  </div>

  <div class="bg-[#111827] p-6 rounded shadow border-2 border-[#2563EB] mt-6">
    <h2 class="text-2xl font-bold mb-8 text-purple-600">AI Recommendations</h2>
    <div id="ai-suggestions" class="text-red-700 leading-relaxed space-y-2"></div>
  </div>

  <div class="bg-[#111827] p-4 rounded shadow border-2 border-[#2563EB] mt-4 relative">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold text-orange-400 shadow-blue-300 drop-shadow-lg">Saved Sites</h2>
      <button onclick="clearSavedSites()" class="bg-red-600 hover:bg-red-700 text-white text-sm px-3 py-1 rounded" title="Clear all saved sites">Delete</button>
    </div>
    <ul id="saved-sites" class="list-none pl-0 mt-2 space-y-1 text-white-800 text-sm"></ul>
  </div>
</div>


<script>
// ===========================================
// SitePulseAI Frontend: Autonomous Add URL
// ===========================================

const API_BASE = "https://sitepulseai-demo-backend.onrender.com"; // your Render backend URL
const websiteInput = document.getElementById("website-url-input"); // input field
const addButton = document.getElementById("add-url-button"); // Add URL button
const dashboardContainer = document.getElementById("dashboard-container"); // where cards render

// ---------------------------
// Utility to normalize domain
// ---------------------------
function normalizeDomain(url) {
  try {
    let u = new URL(url);
    return u.hostname;
  } catch {
    // fallback if user omits protocol
    return url.replace(/^(https?:\/\/)?(www\.)?/, "").split("/")[0];
  }
}

// ---------------------------
// Fetch wrapper
// ---------------------------
async function fetchJSON(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
  return res.json();
}

// ---------------------------
// Render card functions (replace with your existing render logic)
// ---------------------------
function renderUptime(data) { console.log("Uptime:", data); }
function renderLatency(data) { console.log("Latency:", data); }
function renderSSL(data) { console.log("SSL:", data); }
function renderSEO(data) { console.log("SEO:", data); }
function renderVulnerabilities(data) { console.log("Vulnerabilities:", data); }
function renderTraffic(data) { console.log("Traffic:", data); }

// ---------------------------
// Fetch all metrics for a domain
// ---------------------------
async function fetchAllMetrics(domain) {
  try {
    const [
      uptimeData,
      latencyData,
      sslData,
      seoData,
      vulnData,
      trafficData
    ] = await Promise.all([
      fetchJSON(`/uptime/${domain}`),
      fetchJSON(`/latency/${domain}`),
      fetchJSON(`/ssl/${domain}`),
      fetchJSON(`/seo/${domain}`),
      fetchJSON(`/vulnerabilities/${domain}`),
      fetchJSON(`/traffic/${domain}`)
    ]);

    // Render all cards
    renderUptime(uptimeData);
    renderLatency(latencyData);
    renderSSL(sslData);
    renderSEO(seoData);
    renderVulnerabilities(vulnData);
    renderTraffic(trafficData);
  } catch (err) {
    console.error("Error fetching metrics for", domain, err);
    alert(`Failed to fetch metrics for ${domain}: ${err.message}`);
  }
}

// ---------------------------
// Add URL and trigger autonomous monitoring
// ---------------------------
async function addUrl() {
  const domain = normalizeDomain(websiteInput.value);

  const res = await fetch(`${API_BASE}/add_url`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ domain })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.detail);
    return;
  }

  console.log("Monitoring Results:", data.results);

  // 🔥 Render everything from ONE response
  renderUptime(data.results.uptime);
  renderLatency(data.results.latency);
  renderSSL(data.results.ssl);
  renderSEO(data.results.seo);
  renderVulnerabilities(data.results.vulnerabilities);
  renderTraffic(data.results.traffic);
}

  } catch (err) {
    console.error("Add URL failed:", err);
    alert(`Add URL failed: ${err.message}`);
  }
}

// ---------------------------
// Attach click handler
// ---------------------------
addButton.addEventListener("click", addUrl);

// Optional: allow Enter key to add URL
websiteInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") addUrl();
});



async function addAdditionalURL() {
  const input = document.getElementById("multi-url-input");
  const raw = input.value.trim();

  if (!raw) {
    alert("Please enter at least one domain");
    return;
  }

  // 🔹 Split by comma and clean
  const domains = raw.split(",")
    .map(d => d.trim())
    .filter(d => d.length > 0);

  const list = document.getElementById("multi-url-list");

  for (const domain of domains) {
    try {
      const res = await fetch("/add-site", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ domain })
      });

      const data = await res.json();

      const li = document.createElement("li");

      if (data.status === "success") {
        li.textContent = `✅ ${domain}`;
        li.style.color = "#22c55e"; // green
      } else {
        li.textContent = `❌ ${domain} — ${data.message}`;
        li.style.color = "#ef4444"; // red
      }

      list.appendChild(li);

    } catch (err) {
      const li = document.createElement("li");
      li.textContent = `❌ ${domain} — request failed`;
      li.style.color = "#ef4444";
      list.appendChild(li);
    }
  }

  // Clear input after processing
  input.value = "";
}



/* ---------------------------
   EVENT WIRING
---------------------------- */
startBtn.addEventListener("click", startMonitoring);
</script>


</html>
  
</body>
